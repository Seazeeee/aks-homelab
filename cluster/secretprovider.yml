apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: homelab-keyvault
  namespace: default
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "b5d4d0bb-da13-4f5f-85e8-a0c6dc2f221e"
    keyvaultName: "kv-homelab-matt"
    tenantID: "6fcd1589-5745-4cb0-8129-72df46969c08"
    objects: |
      array:
        - |
          objectName: oauth2-proxy-client-secret
          objectType: secret
  secretObjects:
    - secretName: entra-oidc-secret
      type: Opaque
      data:
        - objectName: oauth2-proxy-client-secret
          key: client-secret
---
