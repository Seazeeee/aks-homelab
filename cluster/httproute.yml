apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-public
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-root
  hostnames:
    - seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Strip any client-supplied identity headers so they can never be spoofed
      # on the unauthenticated route. Only the OIDC outpost (on /dashboard) may set these.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-public-legacy
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - homelab-matt.centralus.cloudapp.azure.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Same identity-header strip as the primary public route.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-authentik
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-auth
  hostnames:
    - auth.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Host
                value: auth.seaze.dev
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-outpost
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-root
  hostnames:
    - seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-blog
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-blog
  hostnames:
    - blog.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Same identity-header strip as the other public routes. The blog never
      # reads these headers, but keeping the invariant (no client-supplied
      # identity headers on any unauthenticated route) is cheap.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis-blog
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-protected
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-root
  hostnames:
    - seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dashboard
      backendRefs:
        - name: homepage
          namespace: homepage
          port: 80
