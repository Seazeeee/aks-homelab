apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-public
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-root
  hostnames:
    - seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Strip any client-supplied identity headers so they can never be spoofed
      # on the unauthenticated route. Only the OIDC outpost (on /dashboard) may set these.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-public-legacy
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - homelab-matt.centralus.cloudapp.azure.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Same identity-header strip as the primary public route.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-authentik
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-auth
  hostnames:
    - auth.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Host
                value: auth.seaze.dev
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-outpost
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-dashboard
  hostnames:
    - dashboard.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-blog
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-blog
  hostnames:
    - blog.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Same identity-header strip as the other public routes. The blog never
      # reads these headers, but keeping the invariant (no client-supplied
      # identity headers on any unauthenticated route) is cheap.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Username
              - X-Authentik-Name
              - X-Authentik-Email
              - X-Authentik-Groups
              - X-Authentik-Uid
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: anubis-blog
          namespace: anubis
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-dashboard
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-dashboard
  hostnames:
    - dashboard.seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Strip the identity headers the Authentik ext-auth does NOT overwrite
      # (only Username/Name/Email/Uid are in headersToBackend, so those are
      # always replaced by the outpost and must not be removed here — route
      # header removal runs after ext-auth injection).
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-Authentik-Groups
              - X-Authentik-Jwt
              - X-Authentik-Meta-Jwks
              - X-Authentik-Meta-Outpost
              - X-Authentik-Meta-Provider
              - X-Authentik-Meta-App
              - X-Authentik-Meta-Version
      backendRefs:
        - name: homepage
          namespace: homepage
          port: 80
---
# Legacy path: seaze.dev/dashboard moved to dashboard.seaze.dev. This more
# specific match wins over the catch-all public route, so old bookmarks get
# a permanent redirect instead of hitting Anubis.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-route-dashboard-redirect
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https-root
  hostnames:
    - seaze.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dashboard
      filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: dashboard.seaze.dev
            path:
              type: ReplaceFullPath
              replaceFullPath: /
            statusCode: 301
