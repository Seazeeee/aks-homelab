apiVersion: v1
kind: Namespace
metadata:
  name: login-page
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: login-page
data:
  Caddyfile: |
    :80 {
      root * /usr/share/caddy
      file_server
      try_files {path} /index.html
      header {
        Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'none'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'"
        X-Frame-Options "DENY"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: login-page-html
  namespace: login-page
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Matt's Homelab</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
      <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          min-height: 100vh;
          background: #080c10;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'DM Sans', sans-serif;
          position: relative;
          overflow: hidden;
        }
        .grid-bg {
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }
        .glow {
          position: fixed;
          width: 600px;
          height: 600px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(56,139,253,0.07) 0%, transparent 70%);
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          pointer-events: none;
        }
        .login-card {
          position: relative;
          z-index: 1;
          width: 380px;
          padding: 2.5rem;
          background: rgba(255,255,255,0.03);
          border: 0.5px solid rgba(255,255,255,0.08);
          border-radius: 16px;
          animation: fadeUp 0.6s ease forwards;
          opacity: 0;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(16px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .status-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 2rem; }
        .status-dot {
          width: 6px; height: 6px; border-radius: 50%; background: #3fb950;
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
        .status-text {
          font-family: 'DM Mono', monospace;
          font-size: 11px;
          color: rgba(255,255,255,0.3);
          letter-spacing: 0.08em;
        }
        .login-title {
          font-size: 22px; font-weight: 500;
          color: rgba(255,255,255,0.9);
          margin: 0 0 4px; letter-spacing: -0.02em;
        }
        .login-sub {
          font-size: 13px; color: rgba(255,255,255,0.3);
          margin: 0 0 2rem; font-weight: 300;
        }
        .divider { height: 0.5px; background: rgba(255,255,255,0.06); margin: 0 0 2rem; }
        .security-row { display: flex; gap: 8px; margin-bottom: 2rem; }
        .sec-badge {
          flex: 1; padding: 8px 10px;
          background: rgba(56,139,253,0.04);
          border: 0.5px solid rgba(56,139,253,0.25);
          border-radius: 8px; text-align: center;
          font-family: 'DM Mono', monospace;
          font-size: 10px; color: rgba(56,139,253,0.6);
          letter-spacing: 0.04em;
        }
        .sign-in-btn {
          width: 100%; padding: 12px;
          background: rgba(255,255,255,0.06);
          border: 0.5px solid rgba(255,255,255,0.12);
          border-radius: 10px; color: rgba(255,255,255,0.85);
          font-family: 'DM Sans', sans-serif;
          font-size: 14px; font-weight: 500; cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          gap: 10px; transition: all 0.2s;
          letter-spacing: 0.01em; text-decoration: none;
        }
        .sign-in-btn:hover {
          background: rgba(255,255,255,0.09);
          border-color: rgba(255,255,255,0.2);
          transform: translateY(-1px);
        }
        .ms-icon { display: flex; gap: 2px; flex-shrink: 0; }
        .ms-icon span { display: block; width: 8px; height: 8px; }
        .footer-text {
          margin-top: 1.5rem;
          font-family: 'DM Mono', monospace;
          font-size: 10px; color: rgba(255,255,255,0.15);
          text-align: center; letter-spacing: 0.06em;
        }
      </style>
    </head>
    <body>
      <div class="grid-bg"></div>
      <div class="glow"></div>
      <div class="login-card">
        <div class="status-bar">
          <div class="status-dot"></div>
          <span class="status-text">ALL SYSTEMS OPERATIONAL</span>
        </div>
        <h1 class="login-title">Matt's Homelab</h1>
        <p class="login-sub">Secure access</p>
        <div class="divider"></div>
        <div class="security-row">
          <div class="sec-badge">CROWDSEC</div>
          <div class="sec-badge">ANUBIS</div>
          <div class="sec-badge">ENTRA ID</div>
        </div>
        <a href="https://seaze.dev/outpost.goauthentik.io/start?rd=https://seaze.dev/dashboard" class="sign-in-btn">
          Sign in with Microsoft
        </a>
        <p class="footer-text">PROTECTED · AKS</p>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-page
  namespace: login-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-page
  template:
    metadata:
      labels:
        app: login-page
    spec:
      containers:
        - name: caddy
          image: acrhomelabmatt.azurecr.io/caddy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/caddy
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: login-page-html
        - name: caddy-config
          configMap:
            name: caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: login-page
  namespace: login-page
spec:
  selector:
    app: login-page
  ports:
    - port: 80
      targetPort: 80
