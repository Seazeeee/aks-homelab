apiVersion: v1
kind: Namespace
metadata:
  name: blog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog
  labels:
    app.kubernetes.io/name: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          # Built by .github/workflows/blog-build.yml on pushes to main that
          # touch apps/blog/**. Digest-pinned (immutable) — CI prints the new
          # digest in its run summary; bump it here to deploy new content.
          image: acrhomelabmatt.azurecr.io/blog@sha256:3a32115e124f766e27e4ab742454c45d34b8d3418126811544f83b8f6967bd5b
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Caddy wants writable config/data dirs even though this instance
            # never persists anything; point them into the emptyDir so the
            # root filesystem can stay read-only.
            - name: HOME
              value: /tmp
            - name: XDG_CONFIG_HOME
              value: /tmp/config
            - name: XDG_DATA_HOME
              value: /tmp/data
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: blog
spec:
  selector:
    app.kubernetes.io/name: blog
  ports:
    - name: http
      port: 80
      targetPort: 8080
