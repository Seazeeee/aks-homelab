<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  {{ $css := slice (resources.Get "css/main.css") (resources.Get "css/chroma.css") | resources.Concat "css/bundle.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
  {{ with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .Permalink }}">
  {{ end }}
</head>
<body>
  <div class="grid-bg"></div>

  <nav>
    <div class="nav-inner">
      <a href="https://seaze.dev" class="nav-logo">seaze<span>.dev</span></a>
      <div class="nav-center">
        <a href="https://seaze.dev">home</a>
        <a href="/" class="active">blog</a>
      </div>
      <a href="{{ "index.xml" | absURL }}" class="nav-rss">rss</a>
    </div>
  </nav>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <span>seaze.dev</span>
    <span>{{ now.Year }}</span>
  </footer>
</body>
</html>
