apiVersion: v1
kind: Service
metadata:
  name: crowdsec-envoy-bouncer
  namespace: envoy-gateway-system
spec:
  # Name/namespace/port MUST match security/crowdsec/securitypolicy.yml exactly —
  # that ext_authz policy is failOpen:false, so a mismatch denies ALL ingress.
  selector:
    app.kubernetes.io/name: crowdsec-envoy-bouncer
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
      appProtocol: grpc
