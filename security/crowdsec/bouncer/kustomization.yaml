apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system
# INERT: this kustomization is intentionally NOT referenced by security/kustomization.yaml.
# Merging this branch does NOT deploy the vendored bouncer over the live kdwils one.
# Cutover is a deliberate maintenance-window step — see RUNBOOK.md.
resources:
  - deployment.yaml
  - service.yaml
# Config as a hashed ConfigMap so a config change rolls the Deployment.
configMapGenerator:
  - name: crowdsec-envoy-bouncer-config
    files:
      - config.yaml
