apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system
# Wired into security/kustomization.yaml — Flux deploys this. The live cutover
# (replacing the kdwils Helm release) is a deliberate maintenance-window step;
# suspend infra-security before merge, then helm-uninstall the old release.
resources:
  - deployment.yaml
  - service.yaml
# Config as a hashed ConfigMap so a config change rolls the Deployment.
configMapGenerator:
  - name: crowdsec-envoy-bouncer-config
    files:
      - config.yaml
