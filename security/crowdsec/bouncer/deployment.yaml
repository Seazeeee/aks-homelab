apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-envoy-bouncer
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: crowdsec-envoy-bouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec-envoy-bouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec-envoy-bouncer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bouncer
          # Vendored into the user's ACR, built from upstream tag v0.6.1 (chart 0.6.1
          # appVersion). Digest-pinned (immutable) — re-run the ACR build to bump.
          image: acrhomelabmatt.azurecr.io/envoy-proxy-bouncer@sha256:402d9375ac2fcb4ac8369141e850d8ce859c889e5d3b925a4da4b0756625f4c6
          imagePullPolicy: IfNotPresent
          args: ["serve", "--config", "/app/config/config.yaml"]
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
          env:
            # Same api-key feeds both the LAPI bouncer and the AppSec WAF
            # (matches the upstream chart's single-key reuse). From the existing
            # secret — never hardcoded in Git.
            - name: ENVOY_BOUNCER_BOUNCER_APIKEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-envoy-bouncer-secrets
                  key: api-key
            - name: ENVOY_BOUNCER_WAF_APIKEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-envoy-bouncer-secrets
                  key: api-key
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            # Mounting the SPC is what makes the CSI driver materialize the
            # crowdsec-envoy-bouncer-secrets Secret (consumed via secretKeyRef
            # above). Without a pod mounting it, that synced Secret is GC'd.
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # gRPC health — the binary serves named "liveness"/"readiness" services
          # (verified against upstream chart template). The `service:` names are
          # REQUIRED; without them the default health service is probed and the
          # pod never goes Ready -> failOpen:false -> all ingress denied.
          readinessProbe:
            grpc:
              port: 8080
              service: readiness
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 8080
              service: liveness
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: crowdsec-envoy-bouncer-config
        - name: tmp
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: crowdsec-keyvault
