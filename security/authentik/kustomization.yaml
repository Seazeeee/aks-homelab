apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
# auth_values.yml stays the single source of truth for the chart values; it is
# surfaced to the HelmRelease as a ConfigMap (stable name, no hash suffix, so
# the valuesFrom reference resolves).
configMapGenerator:
  - name: authentik-values
    namespace: authentik
    files:
      - values.yaml=auth_values.yml
    options:
      disableNameSuffixHash: true
