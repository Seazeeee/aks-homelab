# Adopts the existing `authentik` Helm release in the authentik namespace.
# helm-controller takes over by running an upgrade against the matching
# releaseName+namespace — values are byte-identical to the original install
# (sourced from auth_values.yml via the configMapGenerator below), so the
# upgrade is a no-op and pods are not disrupted.
#
# Version is PINNED — chart upgrades are deliberate (bump here, review, merge),
# never automatic. The HelmRepository is still polled so a stale index doesn't
# block reconciliation.
#
# Secrets (secret_key, postgres password) are resolved at runtime from the CSI
# Key Vault mount (SPC authentik-keyvault) via file:///mnt/secrets/... refs in
# auth_values.yml — nothing secret lives in Git. External Postgres
# (postgresql.enabled: false) is preserved.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  releaseName: authentik
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2026.5.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: authentik-values
      valuesKey: values.yaml
