# Second Anubis instance fronting the blog. Anubis proxies to a single
# hardcoded TARGET, so each protected backend needs its own instance; the
# blog lives on its own hostname (blog.seaze.dev), which keeps the two
# instances' challenge cookies from colliding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: anubis-blog-env
  namespace: anubis
data:
  BIND: ":8923"
  DIFFICULTY: "10"
  METRICS_BIND: ":9090"
  # Unlike the homepage instance, pass Hugo's permissive robots.txt through —
  # the blog wants search engines to index it.
  SERVE_ROBOTS_TXT: "false"
  OG_PASSTHROUGH: "true"
  TARGET: "http://blog.blog.svc.cluster.local:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis-blog
  namespace: anubis
  labels:
    app.kubernetes.io/name: anubis-blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anubis-blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anubis-blog
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anubis
          image: acrhomelabmatt.azurecr.io/anubis:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8923
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: anubis-blog-env
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: anubis-blog
  namespace: anubis
spec:
  selector:
    app.kubernetes.io/name: anubis-blog
  ports:
    - name: http
      port: 80
      targetPort: 8923
