# No dependsOn: apps create the namespaces that ./gateway ReferenceGrants need,
# so apps must be free to reconcile independently. Flux retries until converged.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./apps
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
