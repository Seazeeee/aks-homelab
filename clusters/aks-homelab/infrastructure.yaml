# No dependsOn between gateway and apps: the ReferenceGrants in ./gateway live
# inside namespaces created by ./apps, so a strict order deadlocks (gateway
# waits on the app namespaces; apps waited on gateway). Flux reconciles those
# paths independently and retries until they converge. prune:true is enabled
# now that the initial adoption reconciled cleanly — Flux will remove
# resources that are deleted from Git.
#
# infra-cluster DOES depend on infra-security: HTTPRoutes must never go live
# before the SecurityPolicies that gate them (a route reconciling ahead of its
# ext-auth policy briefly serves the backend unauthenticated). Nothing in
# ./security needs ./cluster objects at apply time, so this cannot deadlock.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cluster
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-security
  interval: 10m
  retryInterval: 1m
  path: ./cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-security
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./security
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
