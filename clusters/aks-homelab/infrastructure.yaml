---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway
  namespace: flux-system
spec:
  interval: 10m
  path: ./gateway
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cluster
  namespace: flux-system
spec:
  interval: 10m
  path: ./cluster
  prune: false
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-security
  namespace: flux-system
spec:
  interval: 10m
  path: ./security
  prune: false
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
