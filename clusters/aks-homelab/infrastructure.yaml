# No dependsOn between these: the ReferenceGrants in ./gateway live inside
# namespaces created by ./apps, so a strict order deadlocks (gateway waits on
# the app namespaces; apps waited on gateway). Flux reconciles all paths
# independently and retries until they converge. Safe with prune:false.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./gateway
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cluster
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./cluster
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-security
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./security
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
