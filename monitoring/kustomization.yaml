apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
# Chart values are split per-application: prometheus_values.yml (Operator,
# Prometheus, Alertmanager, exporters, rules) and grafana_values.yml (Grafana
# sub-chart). Both are surfaced as keys on one ConfigMap (stable name, no hash
# suffix so the valuesFrom references resolve) and merged by the HelmRelease's
# valuesFrom in order (prometheus then grafana) — see helmrelease.yaml.
configMapGenerator:
  - name: monitoring-values
    namespace: monitoring
    files:
      - prometheus.yaml=prometheus_values.yml
      - grafana.yaml=grafana_values.yml
    options:
      disableNameSuffixHash: true
