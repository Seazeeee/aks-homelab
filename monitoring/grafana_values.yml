# kube-prometheus-stack values — GRAFANA sub-chart only. Merged with
# prometheus_values.yml into the single HelmRelease via valuesFrom (see
# helmrelease.yaml + kustomization.yaml). Grafana is the read surface for the
# Prometheus TSDB; dashboard.seaze.dev will later embed summary views from it.
#
# SSO is via Authentik (auth.generic_oauth) with a forward-auth outpost gating
# the route; admin + OIDC creds resolve from Azure Key Vault (CSI) at runtime —
# nothing secret lives here.
grafana:
  # Stable Service name for the HTTPRoute/ReferenceGrant instead of the
  # release-prefixed default.
  fullnameOverride: grafana
  # Admin creds come from the Key Vault-synced Secret (SPC grafana-keyvault);
  # mounting the CSI volume below is what triggers the Secrets Store driver
  # to materialize it — Secret sync only happens while a pod mounts the SPC.
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  extraSecretMounts:
    - name: grafana-keyvault
      mountPath: /mnt/secrets
      readOnly: true
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: grafana-keyvault
  # OIDC client id/secret arrive as GF_AUTH_GENERIC_OAUTH_* env vars from the
  # Key Vault-synced Secret grafana-oidc (same SPC as grafana-admin) — the
  # grafana.ini block below holds only non-secret endpoints.
  envFromSecret: grafana-oidc
  grafana.ini:
    server:
      root_url: https://grafana.seaze.dev
    security:
      cookie_secure: true
    # New SSO users self-provision (allow_sign_up) into the default org. Pin the
    # default role explicitly to Viewer so the "new user = read-only" guarantee
    # is self-documenting and immune to a chart/Grafana default change — Admin is
    # granted via grafana-admins group membership (role sync on, see
    # auth.generic_oauth.role_attribute_path).
    users:
      auto_assign_org_role: Viewer
    analytics:
      check_for_updates: false
      reporting_enabled: false
    auth:
      # Logging out of Grafana also ends the Authentik session; otherwise
      # auto_login below would silently sign the user straight back in.
      signout_redirect_url: https://auth.seaze.dev/application/o/grafana-oidc/end-session/
    # SSO against Authentik. The forward-auth gate on the HTTPRoute stays in
    # front (unauthenticated traffic never reaches Grafana); by the time this
    # flow runs the browser already has an Authentik session, so the OIDC
    # redirect completes without a prompt.
    auth.generic_oauth:
      enabled: true
      name: authentik
      # Skip Grafana's own login screen. Break-glass: the admin form (Key
      # Vault creds) is still reachable at /login?disableAutoLogin=true.
      auto_login: true
      scopes: openid profile email groups
      auth_url: https://auth.seaze.dev/application/o/authorize/
      token_url: https://auth.seaze.dev/application/o/token/
      api_url: https://auth.seaze.dev/application/o/userinfo/
      use_pkce: true
      allow_sign_up: true
      # In-repo fail-closed backstop: even if the Authentik application's
      # policy bindings are ever loosened, only these groups can log in.
      # (Grafana splits this list on spaces AND commas, hence no spaces in
      # the group names.)
      # DO NOT re-enable until the OIDC provider actually emits a `groups`
      # claim (see scopes above + the groups property-mapping on the
      # grafana-oidc provider) — otherwise every user matches zero groups and
      # is rejected with "not a member of one of the required groups".
      # allowed_groups: grafana-admins, grafana-viewers
      # Authentik group -> Grafana org role; grafana-viewers is read-only.
      # OAuth org-role sync is ON: the role is derived from the `groups` claim
      # on every login (now that Grafana actually requests the groups scope), so
      # membership in grafana-admins -> Org Admin, everyone else -> Viewer.
      # Null-safe: when no `groups` claim is present, `groups[*]` is null and
      # bare contains(null, ...) raises a JMESPath type error that surfaces as
      # "User sync failed". `|| `[]`` coerces the missing claim to an empty
      # array so the path degrades to Viewer instead of failing the login.
      role_attribute_path: "contains(groups[*] || `[]`, 'grafana-admins') && 'Admin' || 'Viewer'"
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 4Gi
  # RWO Azure disk: a rolling update deadlocks waiting to attach the volume
  # a second time, so replace the pod instead.
  deploymentStrategy:
    type: Recreate
  # fsGroup (472, chart default securityContext) already makes the PVC
  # writable; the chart's chown init container would be the only root
  # container in the stack, so keep it off.
  initChownData:
    enabled: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi
  # Skip the helm-test pod (extra image, no value in GitOps flow).
  testFramework:
    enabled: false
